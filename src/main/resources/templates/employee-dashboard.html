<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-4 py-md-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
            <h1 class="h3 fw-bold mb-1">Welcome, <span th:text="${employee.fullName}">Employee</span></h1>
            <p class="text-muted mb-0" th:text="${employee.department + ' - ' + employee.designation}">Department</p>
        </div>
        <a th:href="@{/employee/apply-leave}" class="btn btn-primary">Apply Leave</a>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
            <div class="stat-card">
                <span>Total</span>
                <strong th:text="${totalLeaves}">0</strong>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card">
                <span>Pending</span>
                <strong th:text="${pendingLeaves}">0</strong>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card">
                <span>Approved</span>
                <strong th:text="${approvedLeaves}">0</strong>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card">
                <span>Rejected</span>
                <strong th:text="${rejectedLeaves}">0</strong>
            </div>
        </div>
    </div>

    <div class="content-panel">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 fw-semibold mb-0">Recent Leave Requests</h2>
            <a th:href="@{/employee/leave-history}" class="btn btn-outline-primary btn-sm">View All</a>
        </div>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Type</th>
                    <th>Dates</th>
                    <th>Status</th>
                    <th>Applied</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(recentLeaves)}">
                    <td colspan="4" class="text-center text-muted py-4">No leave requests yet.</td>
                </tr>
                <tr th:each="leave : ${recentLeaves}">
                    <td th:text="${leave.leaveType}">Sick Leave</td>
                    <td>
                        <span th:text="${#temporals.format(leave.startDate, 'dd MMM yyyy')}">01 Jan 2026</span>
                        <span>to</span>
                        <span th:text="${#temporals.format(leave.endDate, 'dd MMM yyyy')}">02 Jan 2026</span>
                    </td>
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${leave.status.name() == 'APPROVED'} ? ' text-bg-success' : (${leave.status.name() == 'REJECTED'} ? ' text-bg-danger' : ' text-bg-warning')"
                              th:text="${leave.status}">PENDING</span>
                    </td>
                    <td th:text="${#temporals.format(leave.appliedAt, 'dd MMM yyyy')}">01 Jan 2026</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
