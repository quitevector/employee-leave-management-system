<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="form-card p-4 p-md-5">
                <h1 class="h3 fw-bold mb-1">Employee Registration</h1>
                <p class="text-muted mb-4">Create an employee account to apply for leave.</p>

                <form th:action="@{/register}" th:object="${employeeRegistrationDto}" method="post" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="fullName" class="form-label">Full Name</label>
                            <input id="fullName" type="text" th:field="*{fullName}"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'" class="form-control">
                            <div class="invalid-feedback" th:errors="*{fullName}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input id="email" type="email" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" class="form-control">
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="department" class="form-label">Department</label>
                            <input id="department" type="text" th:field="*{department}"
                                   th:classappend="${#fields.hasErrors('department')} ? 'is-invalid'" class="form-control">
                            <div class="invalid-feedback" th:errors="*{department}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="designation" class="form-label">Designation</label>
                            <input id="designation" type="text" th:field="*{designation}"
                                   th:classappend="${#fields.hasErrors('designation')} ? 'is-invalid'" class="form-control">
                            <div class="invalid-feedback" th:errors="*{designation}"></div>
                        </div>
                        <div class="col-12">
                            <label for="password" class="form-label">Password</label>
                            <input id="password" type="password" th:field="*{password}"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" class="form-control">
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-4">Create Account</button>
                    <p class="text-center text-muted mt-3 mb-0">
                        Already registered? <a th:href="@{/login}">Login here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
