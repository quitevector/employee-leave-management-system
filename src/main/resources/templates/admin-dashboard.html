<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-4 py-md-5">
    <div class="mb-4">
        <h1 class="h3 fw-bold mb-1">Admin Dashboard</h1>
        <p class="text-muted mb-0">Review, approve, and reject employee leave requests.</p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <span>Pending</span>
                <strong th:text="${pendingCount}">0</strong>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <span>Approved</span>
                <strong th:text="${approvedCount}">0</strong>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <span>Rejected</span>
                <strong th:text="${rejectedCount}">0</strong>
            </div>
        </div>
    </div>

    <div class="content-panel">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Employee</th>
                    <th>Type</th>
                    <th>Dates</th>
                    <th>Reason</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(leaveRequests)}">
                    <td colspan="6" class="text-center text-muted py-4">No leave requests found.</td>
                </tr>
                <tr th:each="leave : ${leaveRequests}">
                    <td>
                        <div class="fw-semibold" th:text="${leave.employee.fullName}">Employee</div>
                        <div class="text-muted small" th:text="${leave.employee.email}">email@example.com</div>
                    </td>
                    <td th:text="${leave.leaveType}">Sick Leave</td>
                    <td>
                        <span th:text="${#temporals.format(leave.startDate, 'dd MMM yyyy')}">01 Jan 2026</span>
                        <span>to</span>
                        <span th:text="${#temporals.format(leave.endDate, 'dd MMM yyyy')}">02 Jan 2026</span>
                    </td>
                    <td class="reason-cell" th:text="${leave.reason}">Reason</td>
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${leave.status.name() == 'APPROVED'} ? ' text-bg-success' : (${leave.status.name() == 'REJECTED'} ? ' text-bg-danger' : ' text-bg-warning')"
                              th:text="${leave.status}">PENDING</span>
                    </td>
                    <td>
                        <div class="d-flex flex-column gap-2" th:if="${leave.status.name() == 'PENDING'}">
                            <form th:action="@{/admin/leaves/{id}/approve(id=${leave.id})}" method="post">
                                <button type="submit" class="btn btn-success btn-sm w-100">Approve</button>
                            </form>
                            <form th:action="@{/admin/leaves/{id}/reject(id=${leave.id})}" method="post">
                                <input type="text" name="remarks" class="form-control form-control-sm mb-2"
                                       placeholder="Remarks">
                                <button type="submit" class="btn btn-outline-danger btn-sm w-100">Reject</button>
                            </form>
                        </div>
                        <span th:if="${leave.status.name() != 'PENDING'}" class="text-muted small"
                              th:text="${leave.adminRemarks ?: 'Reviewed'}">Reviewed</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
