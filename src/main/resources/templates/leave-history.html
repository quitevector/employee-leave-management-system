<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leave History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-4 py-md-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
            <h1 class="h3 fw-bold mb-1">Leave History</h1>
            <p class="text-muted mb-0">Track all leave requests and review decisions.</p>
        </div>
        <a th:href="@{/employee/apply-leave}" class="btn btn-primary">Apply Leave</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="content-panel">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Type</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Reason</th>
                    <th>Status</th>
                    <th>Remarks</th>
                    <th>Applied</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(leaveRequests)}">
                    <td colspan="7" class="text-center text-muted py-4">No leave history available.</td>
                </tr>
                <tr th:each="leave : ${leaveRequests}">
                    <td th:text="${leave.leaveType}">Sick Leave</td>
                    <td th:text="${#temporals.format(leave.startDate, 'dd MMM yyyy')}">01 Jan 2026</td>
                    <td th:text="${#temporals.format(leave.endDate, 'dd MMM yyyy')}">02 Jan 2026</td>
                    <td class="reason-cell" th:text="${leave.reason}">Reason</td>
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${leave.status.name() == 'APPROVED'} ? ' text-bg-success' : (${leave.status.name() == 'REJECTED'} ? ' text-bg-danger' : ' text-bg-warning')"
                              th:text="${leave.status}">PENDING</span>
                    </td>
                    <td th:text="${leave.adminRemarks ?: '-'}">-</td>
                    <td th:text="${#temporals.format(leave.appliedAt, 'dd MMM yyyy')}">01 Jan 2026</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
