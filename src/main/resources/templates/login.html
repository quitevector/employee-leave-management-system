<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <div class="form-card p-4 p-md-5">
                <h1 class="h3 fw-bold mb-1">Login</h1>
                <p class="text-muted mb-4">Access your dashboard.</p>

                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${loginError}" class="alert alert-danger" th:text="${loginError}"></div>

                <form th:action="@{/login}" th:object="${loginDto}" method="post" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input id="email" type="email" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" class="form-control">
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input id="password" type="password" th:field="*{password}"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" class="form-control">
                        <div class="invalid-feedback" th:errors="*{password}"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                    <p class="text-center text-muted mt-3 mb-0">
                        New employee? <a th:href="@{/register}">Register here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
