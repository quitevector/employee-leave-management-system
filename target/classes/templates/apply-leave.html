<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apply Leave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-4 py-md-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="form-card p-4 p-md-5">
                <h1 class="h3 fw-bold mb-1">Apply Leave</h1>
                <p class="text-muted mb-4">Submit a leave request for admin review.</p>

                <form th:action="@{/employee/apply-leave}" th:object="${leaveRequestDto}" method="post" novalidate>
                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                        <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="leaveType" class="form-label">Leave Type</label>
                        <select id="leaveType" th:field="*{leaveType}"
                                th:classappend="${#fields.hasErrors('leaveType')} ? 'is-invalid'" class="form-select">
                            <option value="">Select leave type</option>
                            <option value="Sick Leave">Sick Leave</option>
                            <option value="Casual Leave">Casual Leave</option>
                            <option value="Earned Leave">Earned Leave</option>
                            <option value="Maternity Leave">Maternity Leave</option>
                            <option value="Paternity Leave">Paternity Leave</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{leaveType}"></div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="startDate" class="form-label">Start Date</label>
                            <input id="startDate" type="date" th:field="*{startDate}"
                                   th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid'" class="form-control">
                            <div class="invalid-feedback" th:errors="*{startDate}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="endDate" class="form-label">End Date</label>
                            <input id="endDate" type="date" th:field="*{endDate}"
                                   th:classappend="${#fields.hasErrors('endDate')} ? 'is-invalid'" class="form-control">
                            <div class="invalid-feedback" th:errors="*{endDate}"></div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <label for="reason" class="form-label">Reason</label>
                        <textarea id="reason" rows="5" th:field="*{reason}"
                                  th:classappend="${#fields.hasErrors('reason')} ? 'is-invalid'" class="form-control"></textarea>
                        <div class="invalid-feedback" th:errors="*{reason}"></div>
                    </div>
                    <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Submit Request</button>
                        <a th:href="@{/employee/dashboard}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
