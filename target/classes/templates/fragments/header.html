<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}">LeaveMS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item" th:if="${session.employeeId == null and session.adminId == null}">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item" th:if="${session.employeeId == null and session.adminId == null}">
                    <a class="nav-link" th:href="@{/register}">Register</a>
                </li>
                <li class="nav-item" th:if="${session.employeeId == null and session.adminId == null}">
                    <a class="btn btn-light btn-sm text-primary fw-semibold ms-lg-2" th:href="@{/login}">Login</a>
                </li>

                <li class="nav-item" th:if="${session.employeeId != null}">
                    <a class="nav-link" th:href="@{/employee/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item" th:if="${session.employeeId != null}">
                    <a class="nav-link" th:href="@{/employee/apply-leave}">Apply Leave</a>
                </li>
                <li class="nav-item" th:if="${session.employeeId != null}">
                    <a class="nav-link" th:href="@{/employee/leave-history}">Leave History</a>
                </li>

                <li class="nav-item" th:if="${session.adminId != null}">
                    <a class="nav-link" th:href="@{/admin/dashboard}">Admin Dashboard</a>
                </li>

                <li class="nav-item dropdown" th:if="${session.employeeId != null or session.adminId != null}">
                    <a class="nav-link dropdown-toggle" href="#" id="userMenu" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false" th:text="${session.employeeName}">User</a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button class="dropdown-item" type="submit">Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
